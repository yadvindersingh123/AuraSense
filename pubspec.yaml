name: wifi
description: A simple Flutter WiFi project
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  wifi_iot: ^0.3.18
  permission_handler: ^11.3.1
  http: ^1.2.2
  url_launcher: ^6.3.1
  network_info_plus: ^6.1.0
  wifi_scan: ^0.4.1+2
  connectivity_plus: ^7.0.0
  firebase_core: ^4.1.1
  firebase_database: ^12.0.2
  cloud_firestore: ^6.0.2
  firebase_auth: ^6.1.1
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - lib/.env

